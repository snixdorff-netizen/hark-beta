<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1f1b"/>
      <stop offset="100%" stop-color="#060e0b"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3ec99f" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#3ec99f" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g stroke="rgba(62,201,159,0.05)" stroke-width="1">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="560" x2="1200" y2="560"/>
    <line x1="160" y1="0" x2="160" y2="630"/>
    <line x1="320" y1="0" x2="320" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/>
    <line x1="640" y1="0" x2="640" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/>
    <line x1="1120" y1="0" x2="1120" y2="630"/>
  </g>

  <!-- Glow accent -->
  <ellipse cx="600" cy="200" rx="400" ry="200" fill="url(#glow)"/>

  <!-- HARK wordmark -->
  <text x="80" y="72" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="24" font-weight="600" letter-spacing="6" fill="#3ec99f">HARK</text>

  <!-- Creature emojis -->
  <text x="218" y="310" font-size="120" text-anchor="middle">🦉</text>
  <text x="418" y="310" font-size="120" text-anchor="middle">🦊</text>
  <text x="618" y="310" font-size="120" text-anchor="middle">🦚</text>
  <text x="818" y="310" font-size="120" text-anchor="middle">🐋</text>
  <text x="1018" y="310" font-size="120" text-anchor="middle">🐺</text>

  <!-- Teal divider line -->
  <line x1="80" y1="370" x2="1120" y2="370" stroke="#3ec99f" stroke-width="1" stroke-opacity="0.3"/>

  <!-- Main tagline -->
  <text x="600" y="438" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="48" font-weight="600" fill="#eef3f0" text-anchor="middle">Hear what you've been missing.</text>

  <!-- Sub tagline -->
  <text x="600" y="496" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="22" fill="rgba(159,178,170,0.8)" text-anchor="middle">93 real field recordings · name them all</text>

  <!-- Bottom accent -->
  <rect x="80" y="570" width="1040" height="1" fill="rgba(62,201,159,0.15)"/>
  <text x="600" y="606" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="16" fill="rgba(159,178,170,0.5)" text-anchor="middle">snixdorff-netizen.github.io/hark-beta</text>
</svg>
